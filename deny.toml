# cargo-deny — 라이선스 게이트(CI). 번들(.so)에 정적 링크되는 크레이트가 허용 목록
# 밖의 라이선스(특히 copyleft)를 끌어오면 `cargo deny check licenses`가 실패한다.
# about.toml의 accepted와 동기화할 것.
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
    "PostgreSQL",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
