# cargo-about — 번들(.so)에 정적 링크되는 Rust 크레이트의 라이선스/저작권 박제용.
# `make licenses`로 THIRD_PARTY_LICENSES/RUST_CRATES.html 생성. accepted에 없는
# 라이선스가 나오면 generate가 실패한다(= copyleft 유입 1차 차단; CI는 cargo-deny).
accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
    "PostgreSQL",
    "CDLA-Permissive-2.0",
]
workarounds = ["ring"]
